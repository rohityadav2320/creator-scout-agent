name: Build Mac Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "SUPABASE_URL = \"$SUPABASE_URL\"" > _build_creds.py
          echo "SUPABASE_KEY = \"$SUPABASE_KEY\"" >> _build_creds.py

      - name: Make .command executable
        run: chmod +x "Start CreatorScout.command"

      - name: Create Mac ZIP
        run: |
          zip CreatorScout-Agent-Mac.zip \
            agent.py scraper.py db.py launcher.py filters.py \
            feed_scraper.py hashtag_library.py presets.py \
            _build_creds.py requirements.txt \
            "Start CreatorScout.command"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Creator Scout Agent — Latest"
          files: CreatorScout-Agent-Mac.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
