name: Build Mac Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller supabase toml playwright playwright-stealth requests pandas openpyxl

      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "SUPABASE_URL = \"$SUPABASE_URL\"" > _build_creds.py
          echo "SUPABASE_KEY = \"$SUPABASE_KEY\"" >> _build_creds.py

      - name: Build Mac binary
        run: |
          python -m PyInstaller \
            --onefile \
            --name "CreatorScout-Agent-Mac" \
            --hidden-import supabase \
            --hidden-import toml \
            --hidden-import playwright \
            --hidden-import playwright.sync_api \
            --hidden-import playwright_stealth \
            --hidden-import db \
            --hidden-import scraper \
            --hidden-import agent \
            launcher.py

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Creator Scout Agent — Latest"
          files: dist/CreatorScout-Agent-Mac
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
